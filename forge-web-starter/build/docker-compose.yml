services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: forge-postgres
    environment:
      POSTGRES_DB: forge
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: forge
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    ports:
      - "5432:5432"
    volumes:
      # Persist database data
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge -d forge"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - forge-network

  # ============================================
  # Redis Cache (Optional - for performance)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: forge-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      # Persist cache data
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - forge-network

  # ============================================
  # Redis Commander (Redis GUI - Optional)
  # ============================================
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: forge-redis-commander
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - forge-network
    profiles:
      - tools  # Only start with: docker-compose --profile tools up

# ============================================
# Volumes for data persistence
# ============================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pgadmin_data:
    driver: local

# ============================================
# Network for service communication
# ============================================
networks:
  forge-network:
    driver: bridge

