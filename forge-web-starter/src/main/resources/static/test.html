<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forge Web Starter - Test Client</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 30px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .section {
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .section h2 {
            color: #444;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        button:hover {
            background: #5568d3;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button.danger {
            background: #e74c3c;
        }

        button.danger:hover {
            background: #c0392b;
        }

        .status {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 10px;
        }

        .status.connected {
            background: #d4edda;
            color: #155724;
        }

        .status.disconnected {
            background: #f8d7da;
            color: #721c24;
        }

        .info-box {
            background: white;
            padding: 15px;
            border-radius: 6px;
            margin-top: 10px;
            border-left: 4px solid #667eea;
        }

        .game-state {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 15px;
        }

        .player-area {
            background: white;
            padding: 15px;
            border-radius: 6px;
            border: 2px solid #667eea;
        }

        .player-area h3 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .life {
            font-size: 24px;
            font-weight: bold;
            color: #e74c3c;
            margin: 10px 0;
        }

        .card-list {
            margin-top: 10px;
        }

        .card {
            background: #f0f0f0;
            padding: 8px;
            margin: 5px 0;
            border-radius: 4px;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card button {
            padding: 4px 10px;
            font-size: 11px;
        }

        #messages {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 6px;
            height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
        }

        .message {
            margin: 5px 0;
        }

        .message.sent {
            color: #4ec9b0;
        }

        .message.received {
            color: #ce9178;
        }

        .message.info {
            color: #608b4e;
        }

        .message.error {
            color: #f48771;
        }

        input {
            padding: 8px 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            min-width: 200px;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Forge Web Starter - Test Client</h1>
        <p class="subtitle">Test REST API and WebSocket functionality</p>

        <!-- REST API Section -->
        <div class="section">
            <h2>📡 REST API Tests</h2>
            <div class="controls">
                <button onclick="testGetCards()">Get All Cards</button>
                <button onclick="testGetCard()">Get Card #1</button>
                <button onclick="testSearchCards()">Search "Bolt"</button>
                <button onclick="testCreateCard()">Create New Card</button>
            </div>
            <div class="info-box" id="restResult">
                Click a button to test the REST API...
            </div>
        </div>

        <!-- Game Management Section -->
        <div class="section">
            <h2>🎯 Game Management</h2>
            <div class="controls">
                <button onclick="createGame()">Create New Game</button>
                <button onclick="getGameState()" id="getStateBtn" disabled>Get Game State</button>
                <button onclick="deleteGame()" class="danger" id="deleteBtn" disabled>Delete Game</button>
            </div>
            <div class="info-box">
                <strong>Game ID:</strong> <span id="gameId">None</span>
            </div>
        </div>

        <!-- WebSocket Section -->
        <div class="section">
            <h2>🔌 WebSocket Connection <span class="status disconnected" id="wsStatus">Disconnected</span></h2>
            <div class="controls">
                <button onclick="connectWebSocket()" id="connectBtn">Connect WebSocket</button>
                <button onclick="disconnectWebSocket()" id="disconnectBtn" disabled>Disconnect</button>
            </div>

            <h3 style="margin-top: 20px;">Game Actions:</h3>
            <div class="controls">
                <button onclick="sendAction('DRAW', 'Player1')" id="draw1Btn" disabled>Player1 Draw</button>
                <button onclick="sendAction('DRAW', 'Player2')" id="draw2Btn" disabled>Player2 Draw</button>
                <button onclick="sendAction('PASS_TURN', '')" id="passTurnBtn" disabled>Pass Turn</button>
            </div>

            <div id="gameStateDisplay"></div>
        </div>

        <!-- Messages Section -->
        <div class="section">
            <h2>📜 Message Log</h2>
            <div id="messages"></div>
        </div>
    </div>

    <script>
        let ws = null;
        let currentGameId = null;

        // Message logging
        function log(message, type = 'info') {
            const messagesDiv = document.getElementById('messages');
            const messageEl = document.createElement('div');
            messageEl.className = `message ${type}`;
            messageEl.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            messagesDiv.appendChild(messageEl);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // REST API Tests
        async function testGetCards() {
            try {
                const response = await fetch('/api/cards');
                const data = await response.json();
                document.getElementById('restResult').innerHTML =
                    `<strong>Success!</strong> Found ${data.length} cards: ` +
                    `<pre>${JSON.stringify(data, null, 2)}</pre>`;
                log(`GET /api/cards - ${data.length} cards returned`, 'info');
            } catch (error) {
                log(`Error: ${error.message}`, 'error');
            }
        }

        async function testGetCard() {
            try {
                const response = await fetch('/api/cards/1');
                const data = await response.json();
                document.getElementById('restResult').innerHTML =
                    `<strong>Card #1:</strong> <pre>${JSON.stringify(data, null, 2)}</pre>`;
                log(`GET /api/cards/1 - ${data.name}`, 'info');
            } catch (error) {
                log(`Error: ${error.message}`, 'error');
            }
        }

        async function testSearchCards() {
            try {
                const response = await fetch('/api/cards/search?name=bolt');
                const data = await response.json();
                document.getElementById('restResult').innerHTML =
                    `<strong>Search Results:</strong> <pre>${JSON.stringify(data, null, 2)}</pre>`;
                log(`Search 'bolt' - ${data.length} results`, 'info');
            } catch (error) {
                log(`Error: ${error.message}`, 'error');
            }
        }

        async function testCreateCard() {
            try {
                const newCard = {
                    name: "Test Card",
                    type: "Instant",
                    manaCost: 2,
                    text: "Created from test client!"
                };
                const response = await fetch('/api/cards', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newCard)
                });
                const data = await response.json();
                document.getElementById('restResult').innerHTML =
                    `<strong>Created Card:</strong> <pre>${JSON.stringify(data, null, 2)}</pre>`;
                log(`Created card: ${data.name} (ID: ${data.id})`, 'info');
            } catch (error) {
                log(`Error: ${error.message}`, 'error');
            }
        }

        // Game Management
        async function createGame() {
            try {
                const response = await fetch('/api/game/new', { method: 'POST' });
                const data = await response.json();
                currentGameId = data.gameId;
                document.getElementById('gameId').textContent = currentGameId;
                document.getElementById('getStateBtn').disabled = false;
                document.getElementById('deleteBtn').disabled = false;
                log(`Created game: ${currentGameId}`, 'info');
                displayGameState(data);
            } catch (error) {
                log(`Error: ${error.message}`, 'error');
            }
        }

        async function getGameState() {
            if (!currentGameId) return;
            try {
                const response = await fetch(`/api/game/${currentGameId}`);
                const data = await response.json();
                log(`Retrieved game state for ${currentGameId}`, 'info');
                displayGameState(data);
            } catch (error) {
                log(`Error: ${error.message}`, 'error');
            }
        }

        async function deleteGame() {
            if (!currentGameId) return;
            try {
                await fetch(`/api/game/${currentGameId}`, { method: 'DELETE' });
                log(`Deleted game: ${currentGameId}`, 'info');
                currentGameId = null;
                document.getElementById('gameId').textContent = 'None';
                document.getElementById('getStateBtn').disabled = true;
                document.getElementById('deleteBtn').disabled = true;
                document.getElementById('gameStateDisplay').innerHTML = '';
            } catch (error) {
                log(`Error: ${error.message}`, 'error');
            }
        }

        // WebSocket
        function connectWebSocket() {
            if (!currentGameId) {
                log('Create a game first!', 'error');
                return;
            }

            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws/game/${currentGameId}`;

            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                log('WebSocket connected!', 'info');
                document.getElementById('wsStatus').textContent = 'Connected';
                document.getElementById('wsStatus').className = 'status connected';
                document.getElementById('connectBtn').disabled = true;
                document.getElementById('disconnectBtn').disabled = false;
                document.getElementById('draw1Btn').disabled = false;
                document.getElementById('draw2Btn').disabled = false;
                document.getElementById('passTurnBtn').disabled = false;
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                log(`Received: ${event.data}`, 'received');
                displayGameState(data);
            };

            ws.onerror = (error) => {
                log(`WebSocket error: ${error}`, 'error');
            };

            ws.onclose = () => {
                log('WebSocket disconnected', 'info');
                document.getElementById('wsStatus').textContent = 'Disconnected';
                document.getElementById('wsStatus').className = 'status disconnected';
                document.getElementById('connectBtn').disabled = false;
                document.getElementById('disconnectBtn').disabled = true;
                document.getElementById('draw1Btn').disabled = true;
                document.getElementById('draw2Btn').disabled = true;
                document.getElementById('passTurnBtn').disabled = true;
            };
        }

        function disconnectWebSocket() {
            if (ws) {
                ws.close();
                ws = null;
            }
        }

        function sendAction(actionType, playerId) {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                log('WebSocket not connected!', 'error');
                return;
            }

            const action = {
                gameId: currentGameId,
                playerId: playerId,
                actionType: actionType
            };

            ws.send(JSON.stringify(action));
            log(`Sent: ${JSON.stringify(action)}`, 'sent');
        }

        function displayGameState(state) {
            const html = `
                <div class="game-state">
                    <div class="player-area">
                        <h3>👤 Player 1 ${state.currentPlayer === 'Player1' ? '(Active)' : ''}</h3>
                        <div class="life">❤️ ${state.player1Life}</div>
                        <strong>Hand (${state.player1Hand.length} cards):</strong>
                        <div class="card-list">
                            ${state.player1Hand.map(card => `
                                <div class="card">
                                    <span>${card.name} (${card.manaCost})</span>
                                    <button onclick="playCard('Player1', ${card.id})">Play</button>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    <div class="player-area">
                        <h3>👤 Player 2 ${state.currentPlayer === 'Player2' ? '(Active)' : ''}</h3>
                        <div class="life">❤️ ${state.player2Life}</div>
                        <strong>Hand (${state.player2Hand.length} cards):</strong>
                        <div class="card-list">
                            ${state.player2Hand.map(card => `
                                <div class="card">
                                    <span>${card.name} (${card.manaCost})</span>
                                    <button onclick="playCard('Player2', ${card.id})">Play</button>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
                <div class="info-box" style="margin-top: 15px;">
                    <strong>Battlefield:</strong> ${state.battlefield.length} cards<br>
                    <strong>Phase:</strong> ${state.currentPhase}<br>
                    <strong>Last Action:</strong> ${state.lastAction}
                </div>
            `;
            document.getElementById('gameStateDisplay').innerHTML = html;
        }

        function playCard(player, cardId) {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                log('WebSocket not connected!', 'error');
                return;
            }

            const action = {
                gameId: currentGameId,
                playerId: player,
                actionType: 'PLAY_CARD',
                cardId: cardId
            };

            ws.send(JSON.stringify(action));
            log(`Sent: ${JSON.stringify(action)}`, 'sent');
        }

        // Initial log
        log('Test client loaded. Ready to test!', 'info');
    </script>
</body>
</html>
