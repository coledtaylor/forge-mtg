# Spring Boot Application Configuration

# Server Configuration
server.port=8080

# Application Name
spring.application.name=forge-web-starter

# Logging Configuration
logging.level.root=INFO
logging.level.forge.web.starter=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# DevTools Configuration (auto-reload during development)
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# JSON Serialization
spring.jackson.serialization.indent-output=true
spring.jackson.serialization.write-dates-as-timestamps=false

# WebSocket Configuration
# Increase message size limits if needed
spring.websocket.message-size-limit=65536
spring.websocket.send-buffer-size=65536

