# Spring Boot Configuration for Database-backed Card Storage

spring:
  application:
    name: forge-web-starter

  # ============================================
  # DATABASE CONFIGURATION
  # ============================================

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/forge}
    username: ${DATABASE_USER:forge}
    password: ${DATABASE_PASSWORD:forge}
    driver-class-name: org.postgresql.Driver

    # Connection pool settings
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000

  # ============================================
  # JPA / HIBERNATE CONFIGURATION
  # ============================================

  jpa:
    hibernate:
      ddl-auto: update  # Auto-create/update tables based on entities

    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        show_sql: false  # Set to true to see SQL queries in console

        # Performance settings for batch operations
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

    # Don't keep DB connections open during view rendering
    open-in-view: false

  # ============================================
  # CACHING (Optional - requires Redis)
  # ============================================

  cache:
    type: simple  # Options: simple, redis, none

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

# ============================================
# SERVER CONFIGURATION
# ============================================

server:
  port: 8080
  compression:
    enabled: true

# ============================================
# LOGGING
# ============================================

logging:
  level:
    root: INFO
    forge.web.starter: INFO
    org.hibernate.SQL: WARN
    org.springframework.orm.jpa: INFO

# ============================================
# FORGE CONFIGURATION
# ============================================

forge:
  cards:
    # Path to Forge cardsfolder - adjust if needed
    folder: ${FORGE_CARDS_FOLDER:../forge-gui/res/cardsfolder}
    # Import cards on startup
    import-on-startup: ${IMPORT_CARDS:true}
    # Batch size for database imports
    batch-size: 1000
  # Maximum page size to prevent abuse
  max-page-size: 100
  # Default page size
  default-page-size: 50

